<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/lxgw-wenkai-webfont/1.6.0/style.min.css" />
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/lxgw-wenkai-screen-webfont/1.7.0/style.min.css" />
    <title>中国抽象百科</title>

    <style>
        :root {
            --nav-bg: #f3ebd1;
            --page-bg: #faf6e8;
            --card-bg: #ffffff;
            --text-color: #000000;
            --link-color: #0022ff;
            --border-thick: 2px solid #000000;
            --border-thin: 1px solid #000000;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: "LXGW WenKai Screen", Courier, monospace, 'PingFang SC', sans-serif;
            background-color: var(--page-bg);
            color: var(--text-color);
            line-height: 1.6;
            padding-bottom: 5rem;
        }

        .top-nav-bar {
            background-color: var(--nav-bg);
            width: 100%;
            padding: 12px 0;
            display: flex;
            justify-content: center;
            gap: 12px;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        .nav-btn {
            background: var(--card-bg);
            color: var(--text-color);
            border: var(--border-thick);
            padding: 6px 16px;
            font-size: 14px;
            font-weight: bold;
            text-decoration: none;
            transition: transform 0.1s, background-color 0.1s;
        }

        .nav-btn:hover {
            background-color: #f0ebd8;
            transform: translateY(-1px);
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .hero-section {
            position: relative;
            margin: 80px auto 50px auto;
            display: flex;
            justify-content: center;
        }

        .hero-bg-effect {
            position: absolute;
            font-size: 160px;
            opacity: 0.12;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-15deg);
            pointer-events: none;
            user-select: none;
            z-index: 1;
        }

        .logo-board {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .badge-the {
            background: #000000;
            color: #ffffff;
            font-size: 11px;
            font-weight: bold;
            padding: 2px 6px;
            letter-spacing: 1px;
            align-self: flex-start;
            margin-bottom: -2px;
            margin-left: 2px;
        }

        .tile-container {
            display: flex;
        }

        .letter-tile {
            width: 46px;
            height: 46px;
            background: #ffffff;
            border: var(--border-thin);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            font-weight: bold;
            margin-right: -1px;
        }

        .badge-awards {
            background: #000000;
            color: #ffffff;
            font-size: 13px;
            font-weight: bold;
            padding: 4px 14px;
            letter-spacing: 2px;
            align-self: flex-end;
            margin-top: -2px;
            margin-right: -10px;
        }

        .intro-box {
            background-color: var(--card-bg);
            border-radius: 14px;
            padding: 25px 40px;
            max-width: 960px;
            margin: 0 auto;
            text-align: left;
            font-size: 19px;
            letter-spacing: 0.5px;
        }

        .content-section {
            max-width: 960px;
            margin: 80px auto 0 auto;
            text-align: left;
        }

        .finalists-main-title {
            font-size: 48px;
            font-weight: normal;
            text-align: center;
            margin-bottom: 35px;
            letter-spacing: 1px;
        }

        .finalists-caption {
            font-size: 15px;
            line-height: 1.7;
            margin-bottom: 20px;
            color: #000000;
        }

        .section-sub-title {
            font-size: 32px;
            font-weight: normal;
            margin-top: 50px;
            margin-bottom: 25px;
        }

        .finalist-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 20px;
    margin-bottom: 40px;
    table-layout: fixed;
}

.finalist-table td {
    padding: 6px 10px;
    vertical-align: top;
    width: 33.33%;
}



        .finalist-table a.nominee-link {
            color: var(--link-color);
            text-decoration: none;
        }

        .finalist-table a.nominee-link:hover {
            text-decoration: underline;
        }

        .finalist-table .winner {
            font-weight: bold;
        }

        .finalist-table .special-mention {
            font-style: italic;
        }

    </style>
</head>

<body>

    <div class="top-nav-bar">
        <a href="index.html" class="nav-btn">Home</a>
        <a href="archive.html" class="nav-btn">Archives</a>
    </div>

    <div class="container">



        <div class="hero-section" id="home">
            <div class="hero-bg-effect">🎉</div>
        </div>

        <!-- 主标题 -->
        <div class="intro-box">
            勇哥大厦
        </div>

        <table class="finalist-table">
        <tbody>
            <tr>
                <td><strong>品牌</strong></td>
                <td><strong>称号（姓名）</strong></td>
            </tr>

            <tr>
                <td>家是本</td>
                <td><a href="https://www.bilibili.com/video/BV1hnzFBjEpe?vd_source=81f8148d4d78c5297e373872a7f4c4f3" class="nominee-link">朱剑秋</a></td>
            </tr>


             <tr>
                <td>肯卫汀</td>
                <td><a href="https://www.bilibili.com/video/BV1ejm1Y1EQP?vd_source=81f8148d4d78c5297e373872a7f4c4f3" class="nominee-link">林市长</a></td>
            </tr>

         <tr>
                <td>山野泡泡</td>
                <td><a href="https://www.bilibili.com/video/BV1mKrsBSE21?vd_source=81f8148d4d78c5297e373872a7f4c4f3" class="nominee-link">两江总督</a></td>
            </tr>



        </tbody>
        </table>
    </div>


</body>
</html>
